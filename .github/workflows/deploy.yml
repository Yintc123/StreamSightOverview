name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'StreamSightGoServer/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write # assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: streamsight
  ECS_CLUSTER: streamsight
  ECS_SERVICE: streamsight
  CONTAINER_NAME: streamsight

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        working-directory: StreamSightGoServer
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query taskDefinition > task-definition.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
