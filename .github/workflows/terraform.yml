name: terraform

# Validation-only checker. This stack is applied MANUALLY from AWS CloudShell
# (the bootstrap mechanism) with the operator's own admin credentials and the
# full set of TF_VARs (db/redis + app secrets) — NOT from CI. CI must not apply:
# it wouldn't have every app-secret value, so an apply would drop params from
# app_secrets_set and DELETE SSM parameters that exist in state.
#
# So CI just checks formatting + config validity on every push/PR. No AWS
# credentials, no secrets, no plan/apply.

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.8

      # -backend=false: init providers only, no S3 backend — so this needs no
      # AWS credentials. Real applies run in CloudShell against the S3 backend.
      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        run: terraform validate
