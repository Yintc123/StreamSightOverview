services:
  mariadb:
    image: mariadb:11
    container_name: streamsight-mariadb
    restart: unless-stopped
    environment:
      # Left-hand KEYs are required by the mariadb image; the ${...} names use
      # the generic DB_* convention (matches the backend/Go .env).
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-streamsight}
      MARIADB_USER: ${DB_USER:-streamsight}
      MARIADB_PASSWORD: ${DB_PASSWORD:-streamsight}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: streamsight-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 採集 DB 主機的 OS 層硬體指標（CPU、記憶體、磁碟使用率、IOPS、網路流量）。
  # FastAPI 透過 GET http://node-exporter:9100/metrics 取得即時數據（Prometheus text format）。
  node-exporter:
    image: prom/node-exporter:latest
    container_name: streamsight-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"

  # 採集 MariaDB 引擎層指標（連線數、Buffer Pool 命中率、慢查詢、鎖等待等）。
  # FastAPI 透過 GET http://mysqld-exporter:9104/metrics 取得即時數據（Prometheus text format）。
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: streamsight-mysqld-exporter
    restart: unless-stopped
    command:
      - "--config.my-cnf=/etc/mysqld-exporter/.my.cnf"
    configs:
      - source: mysqld_exporter_config
        target: /etc/mysqld-exporter/.my.cnf
    ports:
      - "${MYSQLD_EXPORTER_PORT:-9104}:9104"
    depends_on:
      mariadb:
        condition: service_healthy

configs:
  mysqld_exporter_config:
    content: |
      [client]
      user=${DB_USER:-streamsight}
      password=${DB_PASSWORD:-streamsight}
      host=mariadb
      port=3306

volumes:
  mariadb_data:
  redis_data:
