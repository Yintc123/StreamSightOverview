services:
  mariadb:
    image: mariadb:11
    container_name: streamsight-mariadb
    restart: unless-stopped
    environment:
      # Left-hand KEYs are required by the mariadb image; the ${...} names use
      # the generic DB_* convention (matches the backend/Go .env).
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-streamsight}
      MARIADB_USER: ${DB_USER:-streamsight}
      MARIADB_PASSWORD: ${DB_PASSWORD:-streamsight}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: streamsight-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  redis_data:
